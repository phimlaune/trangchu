<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube: @phimlaune</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div class="grain-overlay"></div>

    <div class="app-container">

        <div class="screen home-screen active" id="homeScreen">

            <header class="home-header">
                <div class="logo-wrap">
                    <h1 class="logo">Phim Lau Ne</h1>
                </div>
                <p class="subtitle">Đang bảo trì!</p>
                <a href="https://www.youtube.com/@phimlaune" target="_blank" rel="noopener" class="youtube-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                    @phimlaune
                </a>
            </header>

            <div class="search-container">
                <div class="search-inner">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" class="search-input" id="searchInput" placeholder="Tìm tên phim..." autocomplete="off">
                </div>
                <button class="search-btn" id="searchButton">Tìm kiếm</button>
            </div>

            <div class="section-label">
                <span class="section-label-text">Danh sách phim</span>
                <div class="section-line"></div>
            </div>

            <div class="movie-grid" id="movieListContainer"></div>
        </div>

        <div class="screen player-screen" id="playerScreen">
            <div class="player-header">
                <button class="back-btn" id="backButton">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
                    Quay lại
                </button>
                <span class="player-title" id="playerMovieTitle"></span>
            </div>

            <div class="video-wrapper">
                <div class="video-container">
                    <video id="videoPlayer" controls playsinline crossorigin="anonymous"></video>
                </div>
            </div>

            <div class="episodes-section">
                <h3 class="episodes-heading">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="m9 8 6 4-6 4Z"/></svg>
                    Danh sách tập
                </h3>
                <div class="episode-list" id="episodeButtons"></div>
            </div>

            <div class="error-message" id="errorMessage"></div>
        </div>

    </div>
</body>
</html>
