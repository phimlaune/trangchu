<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.player{
    width:min(100%,1000px);
}

video{
    width:100%;
    border-radius:10px;
    background:#000;
}
</style>

</head>
<body>

<div class="player">
    <video id="video" controls autoplay></video>
</div>

<script>

const url="https://v7.kkphimplayer7.com/20260704/SET9VOk9/index.m3u8";

const video=document.getElementById("video");

if(Hls.isSupported()){

    const hls=new Hls();

    hls.loadSource(url);

    hls.attachMedia(video);

}else if(video.canPlayType("application/vnd.apple.mpegurl")){

    video.src=url;

}

</script>

</body>
</html>
