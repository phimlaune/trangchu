<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phim Lau Ne</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div class="noise-overlay"></div>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>

    <div class="app-container">

        <!-- ═══════════════ HOME SCREEN ═══════════════ -->
        <div class="screen home-screen active" id="homeScreen">

            <header class="home-header">
                <div class="header-inner">
                    <div class="brand">
                        <div class="brand-icon">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                                <path d="M15.5 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                                <path d="M15 3v6h6" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                                <path d="m10 10 5 3-5 3V10Z" fill="currentColor"/>
                            </svg>
                        </div>
                        <div class="brand-text">
                            <h1 class="logo">Phim Lau Ne</h1>
                            <span class="logo-tagline">Xem phim cùng gia đình</span>
                        </div>
                    </div>
                    <div class="header-actions">
                        <a href="https://www.youtube.com/@phimlaune" target="_blank" rel="noopener" class="yt-badge">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                            @phimlaune
                        </a>
                        <button class="donate-btn" id="donateBtn" aria-label="Ủng hộ">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.593c-.521-.609-1.057-1.198-1.547-1.75C7.119 16.228 4 12.818 4 9.5 4 6.462 6.462 4 9.5 4c1.468 0 2.876.577 3.916 1.601A5.48 5.48 0 0 1 14.5 4C17.538 4 20 6.462 20 9.5c0 3.318-3.119 6.728-6.453 10.343-.49.552-1.026 1.141-1.547 1.75Z"/></svg>
                            Ủng hộ
                        </button>
                    </div>
                </div>

                <!-- DONATION POPUP -->
                <div class="donate-popup" id="donatePopup">
                    <div class="donate-overlay" id="donateOverlay"></div>
                    <div class="donate-card">
                        <button class="donate-close" id="donateClose" aria-label="Đóng">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
                        </button>
                        <div class="donate-header">
                            <span class="donate-heart">💛</span>
                            <h3 class="donate-title">Ủng hộ kênh</h3>
                            <p class="donate-subtitle">Cảm ơn bạn đã yêu thương kênh!<br>Mọi sự ủng hộ đều giúp kênh duy trì hoạt động.</p>
                        </div>
                        <div class="donate-qr-wrap">
                            <img src="donation.png" alt="QR ủng hộ" class="donate-qr">
                        </div>
                        <p class="donate-note">Quét mã QR để chuyển khoản ủng hộ</p>
                    </div>
                </div>

                <div class="hero-banner">
                    <p class="hero-label">✦ Kho phim hay mỗi ngày</p>
                    <p class="hero-notice" id="heroBanner">Đang tải danh sách phim...</p>
                </div>
            </header>

            <!-- SEARCH -->
            <div class="search-section">
                <div class="search-wrap">
                    <div class="search-box">
                        <svg class="search-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                        <input type="text" class="search-input" id="searchInput" placeholder="Tìm tên phim..." autocomplete="off" spellcheck="false">
                        <button class="clear-btn" id="clearSearch" aria-label="Xóa">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
                        </button>
                    </div>
                    <button class="search-btn" id="searchButton">
                        <span>Tìm</span>
                    </button>
                </div>

                <div class="filter-bar" id="filterBar">
                    <!-- Filter tags dynamically injected -->
                </div>
            </div>

            <!-- LIST HEADER -->
            <div class="list-header">
                <div class="list-title-wrap">
                    <span class="list-title-icon">✦</span>
                    <span class="list-title-text">Danh sách phim</span>
                </div>
                <span class="movie-count" id="movieCount"></span>
            </div>

            <!-- VIEW TOGGLE -->
            <div class="view-toggle" id="viewToggle">
                <button class="vt-btn active" data-view="list" title="Danh sách">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
                </button>
                <button class="vt-btn" data-view="grid" title="Lưới">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                </button>
            </div>

            <div class="movie-container list-view" id="movieListContainer"></div>
        </div>

        <!-- ═══════════════ PLAYER SCREEN ═══════════════ -->
        <div class="screen player-screen" id="playerScreen">

            <div class="player-topbar">
                <button class="back-btn" id="backButton">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
                    <span>Quay lại</span>
                </button>
                <div class="player-breadcrumb">
                    <span class="breadcrumb-home">Trang chủ</span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
                    <span class="breadcrumb-title" id="playerMovieTitle"></span>
                </div>
            </div>

            <!-- MOVIE INFO BANNER -->
            <div class="movie-info-banner" id="movieInfoBanner">
                <div class="mib-poster" id="mibPoster">
                    <div class="poster-placeholder">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
                    </div>
                </div>
                <div class="mib-details">
                    <h2 class="mib-title" id="mibTitle"></h2>
                    <p class="mib-desc" id="mibDesc"></p>
                    <div class="mib-meta">
                        <span class="mib-badge" id="mibEpCount"></span>
                        <span class="mib-badge mib-year" id="mibYear"></span>
                    </div>
                </div>
            </div>

            <!-- VIDEO -->
            <div class="video-section">
                <div class="video-container" id="videoContainer">
                    <video id="videoPlayer" controls playsinline crossorigin="anonymous"></video>
                    <div class="video-loading" id="videoLoading">
                        <div class="vl-spinner"></div>
                        <span>Đang tải phim...</span>
                    </div>
                </div>
                <div class="error-message" id="errorMessage"></div>
            </div>

            <!-- EPISODES -->
            <div class="episodes-panel">
                <div class="ep-panel-header">
                    <div class="ep-panel-title">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="m9 8 6 4-6 4Z"/></svg>
                        Danh sách tập
                    </div>
                    <span class="ep-panel-count" id="epPanelCount"></span>
                </div>
                <div class="episode-grid" id="episodeButtons"></div>
            </div>

        </div><!-- /player-screen -->

    </div><!-- /app-container -->

    <!-- TOAST -->
    <div class="toast" id="toast"></div>
</body>
</html>
